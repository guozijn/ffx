name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: ffx

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary_name: ffx
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            binary_name: ffx
          - name: macos-x86_64
            os: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
            binary_name: ffx
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            binary_name: ffx.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="manual-${GITHUB_SHA::7}"
          fi
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact directory
        shell: bash
        run: |
          PKG_DIR="${BIN_NAME}-${{ steps.version.outputs.value }}-${{ matrix.target }}"
          mkdir -p "${PKG_DIR}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${PKG_DIR}/"
          cp README.md LICENSE "${PKG_DIR}/"
          echo "PKG_DIR=${PKG_DIR}" >> "$GITHUB_ENV"

      - name: Package tarball
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: tar -czf "${PKG_DIR}.tar.gz" "${PKG_DIR}"

      - name: Package zip
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "${env:PKG_DIR}" -DestinationPath "${env:PKG_DIR}.zip"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_DIR }}
          path: |
            ${{ env.PKG_DIR }}.tar.gz
            ${{ env.PKG_DIR }}.zip
          if-no-files-found: error

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref_type == 'tag'

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
